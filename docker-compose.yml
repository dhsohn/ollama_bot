name: ollama_bot

services:
  ollama_bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-4}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-4}"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-4}"
      TOKENIZERS_PARALLELISM: "false"
    entrypoint: ["python", "-m", "apps.ollama_bot.main"]
    volumes:
      - ./data:/app/data
      - ./skills/custom:/app/skills/custom
      - ./auto/custom:/app/auto/custom
      - ./config:/app/config
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    user: "botuser"
    healthcheck:
      test: ["CMD", "bash", "scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "windows-host:${WINDOWS_HOST_IP:-host-gateway}"

networks:
  bot_network:
    driver: bridge
