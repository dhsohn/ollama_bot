name: ollama_bot

services:
  ollama_bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-4}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-4}"
      OPENBLAS_NUM_THREADS: "${OPENBLAS_NUM_THREADS:-4}"
      TOKENIZERS_PARALLELISM: "false"
    depends_on:
      - sim_host_agent
    entrypoint: ["python", "-m", "apps.ollama_bot.main"]
    volumes:
      - ./data:/app/data
      - ./skills/custom:/app/skills/custom
      - ./auto/custom:/app/auto/custom
      - ./config:/app/config
      - ${HOST_KB_DIR:-./kb}/orca_outputs:/app/kb/orca_outputs:ro
      - ${HOST_KB_DIR:-./kb}/orca_runs:/app/kb/orca_runs:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    user: "botuser"
    healthcheck:
      test: ["CMD", "bash", "scripts/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot_network
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "windows-host:${WINDOWS_HOST_IP:-host-gateway}"

  sim_host_agent:
    build: .
    restart: unless-stopped
    pid: "host"
    env_file: .env
    entrypoint:
      - python
      - scripts/sim_host_agent.py
      - --host
      - 0.0.0.0
      - --port
      - "18081"
      - --config
      - /app/config/config.yaml
    volumes:
      - ./config:/app/config:ro
      - ${HOST_KB_DIR:-./kb}/orca_runs:/app/kb/orca_runs:ro
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    cap_add:
      - KILL
    user: "${SIM_AGENT_UID:-1000}:${SIM_AGENT_GID:-1000}"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:18081/health', timeout=2).read()"
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - bot_network

networks:
  bot_network:
    driver: bridge
