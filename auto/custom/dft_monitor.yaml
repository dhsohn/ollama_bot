name: "dft_monitor"
description: "DFT 계산 파일 변경 감지 및 자동 인덱싱"
version: "1.0"
enabled: true
schedule: "*/10 * * * *"
action:
  type: "callable"
  target: "dft_monitor"
  parameters:
    max_file_size_mb: 1024
    recent_completed_window_minutes: 60
output:
  send_to_telegram: true
  save_to_file: null
retry:
  max_attempts: 2
  delay_seconds: 30
timeout: 120
