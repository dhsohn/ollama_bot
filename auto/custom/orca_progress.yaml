name: "orca_progress"
description: "매일 아침 ORCA 시뮬레이션 진행 상황을 보고합니다"
version: "1.0"
enabled: true
schedule: "0 10 * * *"
action:
  type: "callable"
  target: "orca_progress_report"
  parameters:
    orca_runs_dir: "/orca_runs"
output:
  send_to_telegram: true
  save_to_file: "reports/orca_progress_{date}.txt"
retry:
  max_attempts: 2
  delay_seconds: 30
timeout: 60
