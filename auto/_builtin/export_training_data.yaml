name: "export_training_data"
description: "피드백 데이터를 KTO 파인튜닝 형식으로 내보냅니다"
version: "1.0"
enabled: true
schedule: "0 3 * * 0"
action:
  type: "callable"
  target: "export_training_data"
  model_role: "low_cost"
  parameters:
    min_preview_length: 20
output:
  send_to_telegram: true
  save_to_file: "reports/training_export_{date}.md"
retry:
  max_attempts: 1
  delay_seconds: 60
timeout: 300
