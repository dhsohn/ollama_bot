name: "health_check"
description: "시스템 상태를 정기적으로 점검합니다 (이상 발견 시에만 알림)"
version: "2.0"
enabled: true
schedule: "*/30 * * * *"
action:
  type: "callable"
  target: "health_check"
  parameters:
    disk_warn_pct: 85
    error_hours_back: 1
output:
  send_to_telegram: true
  save_to_file: "logs/health_{date}.log"
retry:
  max_attempts: 1
  delay_seconds: 30
timeout: 30
