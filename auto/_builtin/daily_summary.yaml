name: "daily_summary"
description: "매일 아침 어제의 대화를 요약합니다"
version: "1.0"
enabled: true
schedule: "0 9 * * *"
action:
  type: "callable"
  target: "daily_summary"
  model_role: "low_cost"
  parameters:
    days_ago: 1
    timezone_name: "Asia/Seoul"
    max_messages_per_user: 200
    max_chars_per_message: 500
output:
  send_to_telegram: true
  save_to_file: "reports/daily_summary_{date}.md"
retry:
  max_attempts: 3
  delay_seconds: 60
timeout: 120
