# ollama_bot 전역 설정
llm_provider: "lemonade"
log_level: "INFO"
data_dir: "/app/data"

bot:
  name: "ollama_bot"
  language: "ko"
  max_conversation_length: 30
  response_timeout: 180

ollama:
  host: "http://host.docker.internal:11434"
  model: "gpt-oss:20b"
  temperature: 0.7
  max_tokens: 768
  num_ctx: 4096
  prompt_version: "v1"
  system_prompt: |
    당신은 유용한 AI 어시스턴트입니다.
    한국어로 답변하며, 간결하고 정확한 정보를 제공합니다.

lemonade:
  host: "http://windows-host:11434"
  api_key: ""
  # 기본 응답 모델은 low_cost 인스턴스로 라우팅한다.
  model: "GLM-4.7-Flash-GGUF"
  base_path: "/api/v1"
  timeout_seconds: 120
  model_load_timeout_seconds: 120
  heavy_model_load_timeout_seconds: 420
  # primary(11434): 임베딩/리랭커 전용
  # 21434: low_cost + vision, 31434: reasoning/coding
  instances:
    - name: "edge"
      host: "http://windows-host:21434"
      model: "GLM-4.7-Flash-GGUF"
      route_roles: ["low_cost", "vision"]
      route_models: ["GLM-4.7-Flash-GGUF", "Qwen3-VL-8B-Instruct-GGUF"]
    - name: "reasoner"
      host: "http://windows-host:31434"
      model: "gpt-oss-20b-NPU"
      route_roles: ["reasoning", "coding"]
      route_models: ["gpt-oss-20b-NPU"]

telegram:
  polling_interval: 1
  max_message_length: 4096

security:
  allowed_users: []
  rate_limit: 30
  max_concurrent_requests: 2
  max_input_length: 10000
  max_file_size: 10485760
  blocked_paths:
    - "/etc/*"
    - "/proc/*"
    - "/sys/*"

memory:
  backend: "sqlite"
  max_long_term_entries: 1000
  conversation_retention_days: 30

scheduler:
  timezone: "Asia/Seoul"

feedback:
  enabled: true
  show_buttons: true
  min_feedback_for_analysis: 5
  max_guidelines: 5
  preview_max_chars: 300
  preview_cache_max_size: 500
  preview_cache_ttl_hours: 24
  retention_days: 90
  collect_reason: true
  reason_min_chars: 3
  reason_max_chars: 500
  reason_timeout_seconds: 120
  dicl_enabled: true
  dicl_max_examples: 1
  dicl_max_keywords: 5
  dicl_max_total_chars: 1200
  dicl_recent_days: 180

auto_evaluation:
  enabled: false
  daily_limit: 50
  min_response_length: 50
  max_concurrency: 2
  cooldown_seconds: 300

instant_responder:
  enabled: true
  rules_path: "config/instant_rules.yaml"

semantic_cache:
  enabled: true
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  similarity_threshold: 0.92
  min_query_chars: 6
  exclude_patterns:
    - "(지금|현재)\\s*몇\\s*시"
    - "오늘\\s*(날짜|며칠|요일)"
  max_entries: 2000
  ttl_hours: 168
  invalidate_on_negative_feedback: true

intent_router:
  enabled: true
  routes_path: "config/intent_routes.yaml"
  min_confidence: 0.75
  encoder_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"

context_compressor:
  enabled: true
  recent_keep: 10
  summary_refresh_interval: 10
  summary_max_tokens: 200
  background_summarize: false
  summarize_concurrency: 1

# ── 모델 라우팅 + RAG (Lemonade 전용) ──

model_registry:
  embedding_model: "Qwen3-Embedding-0.6B-GGUF"
  reranker_model: "bge-reranker-v2-m3-GGUF"
  vision_model: "Qwen3-VL-8B-Instruct-GGUF"
  low_cost_model: "GLM-4.7-Flash-GGUF"
  reasoning_model: "gpt-oss-20b-NPU"
  coding_model: "gpt-oss-20b-NPU"
  fallback_chain:
    low_cost: ["reasoning"]
    reasoning: ["low_cost"]
    coding: ["low_cost"]
    vision: []

model_routing:
  enabled: true
  anchors_path: "config/routing_anchors.yaml"
  threshold: 0.45
  margin: 0.05
  classifier_timeout_seconds: 90
  embedding_cache_size: 5000

rag:
  enabled: false
  kb_dir: "./kb"
  chunk_min_tokens: 500
  chunk_max_tokens: 1200
  chunk_overlap_ratio: 0.15
  retrieve_k0: 40
  rerank_enabled: true
  rerank_topk: 8
  rerank_budget_ms: 1200
  retrieval_score_floor: 0.3
  supported_extensions:
    - ".md"
    - ".txt"
    - ".pdf"
    - ".docx"
    - ".html"
    - ".htm"
    - ".json"
    - ".csv"
    - ".py"
    - ".js"
    - ".ts"
