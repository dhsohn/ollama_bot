# ollama_bot 전역 설정
llm_provider: "ollama"

bot:
  name: "ollama_bot"
  language: "ko"
  max_conversation_length: 30
  response_timeout: 60

ollama:
  host: "http://host.docker.internal:11434"
  model: "gpt-oss:20b"
  temperature: 0.7
  max_tokens: 768
  num_ctx: 4096
  prompt_version: "v1"
  system_prompt: |
    당신은 유용한 AI 어시스턴트입니다.
    한국어로 답변하며, 간결하고 정확한 정보를 제공합니다.

lemonade:
  host: "http://host.docker.internal:8000"
  api_key: ""
  model: ""
  base_path: "/api/v1"
  timeout_seconds: 60

telegram:
  polling_interval: 1
  max_message_length: 4096

security:
  allowed_users: []
  rate_limit: 30
  max_concurrent_requests: 2
  max_input_length: 10000
  max_file_size: 10485760
  blocked_paths:
    - "/etc/*"
    - "/proc/*"
    - "/sys/*"

memory:
  backend: "sqlite"
  max_long_term_entries: 1000
  conversation_retention_days: 30

scheduler:
  timezone: "Asia/Seoul"

feedback:
  enabled: true
  show_buttons: true
  min_feedback_for_analysis: 5
  max_guidelines: 5
  preview_max_chars: 300
  preview_cache_max_size: 500
  preview_cache_ttl_hours: 24
  retention_days: 90
  collect_reason: true
  reason_min_chars: 3
  reason_max_chars: 500
  reason_timeout_seconds: 120
  dicl_enabled: true
  dicl_max_examples: 1
  dicl_max_keywords: 5
  dicl_max_total_chars: 1200
  dicl_recent_days: 180

auto_evaluation:
  enabled: false
  daily_limit: 50
  min_response_length: 50
  max_concurrency: 2
  cooldown_seconds: 300

instant_responder:
  enabled: true
  rules_path: "config/instant_rules.yaml"

semantic_cache:
  enabled: true
  model_name: "intfloat/multilingual-e5-small"
  embedding_device: "cpu"
  similarity_threshold: 0.92
  min_query_chars: 6
  exclude_patterns:
    - "(지금|현재)\\s*몇\\s*시"
    - "오늘\\s*(날짜|며칠|요일)"
  max_entries: 2000
  ttl_hours: 168
  invalidate_on_negative_feedback: true

intent_router:
  enabled: true
  routes_path: "config/intent_routes.yaml"
  min_confidence: 0.75
  encoder_model: "intfloat/multilingual-e5-small"

context_compressor:
  enabled: true
  recent_keep: 10
  summary_refresh_interval: 10
  summary_max_tokens: 200
  background_summarize: false
  summarize_concurrency: 1
