# ollama_bot 전역 설정
llm_provider: "lemonade"
log_level: "INFO"
data_dir: "/app/data"

bot:
  name: "ollama_bot"
  language: "ko"
  max_conversation_length: 30
  response_timeout: 300

ollama:
  host: "http://host.docker.internal:11434"
  model: "gpt-oss:20b"
  temperature: 0.7
  max_tokens: 1536
  num_ctx: 4096
  prompt_version: "v1"
  system_prompt: |
    당신은 유용한 AI 어시스턴트입니다.
    한국어로 답변하며, 간결하고 정확한 정보를 제공합니다.

lemonade:
  host: "http://windows-host:8000"
  api_key: ""
  base_path: "/api/v1"
  timeout_seconds: 120
  model_load_timeout_seconds: 120
  heavy_model_load_timeout_seconds: 420

telegram:
  polling_interval: 1
  max_message_length: 4096

security:
  allowed_users: []
  rate_limit: 30
  max_concurrent_requests: 2
  max_input_length: 10000
  max_file_size: 10485760
  blocked_paths:
    - "/etc/*"
    - "/proc/*"
    - "/sys/*"

memory:
  backend: "sqlite"
  max_long_term_entries: 1000
  conversation_retention_days: 30

runtime_maintenance:
  memory_maintenance_interval_seconds: 21600  # 6시간
  llm_recovery_interval_seconds: 60
  memory_maintenance_jitter_ratio: 0.1

scheduler:
  timezone: "Asia/Seoul"

feedback:
  enabled: true
  show_buttons: true
  min_feedback_for_analysis: 5
  max_guidelines: 5
  preview_max_chars: 300
  preview_cache_max_size: 500
  preview_cache_ttl_hours: 24
  retention_days: 90
  collect_reason: true
  reason_min_chars: 3
  reason_max_chars: 500
  reason_timeout_seconds: 120
  dicl_enabled: true
  dicl_max_examples: 1
  dicl_max_keywords: 5
  dicl_max_total_chars: 1200
  dicl_recent_days: 180

auto_evaluation:
  enabled: false
  daily_limit: 50
  min_response_length: 50
  max_concurrency: 2
  cooldown_seconds: 300

instant_responder:
  enabled: true
  rules_path: "config/instant_rules.yaml"

semantic_cache:
  enabled: true
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  similarity_threshold: 0.92
  min_query_chars: 6
  exclude_patterns:
    - "(지금|현재)\\s*몇\\s*시"
    - "오늘\\s*(날짜|며칠|요일)"
  max_entries: 2000
  ttl_hours: 168
  invalidate_on_negative_feedback: true

intent_router:
  enabled: true
  routes_path: "config/intent_routes.yaml"
  min_confidence: 0.75
  encoder_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"

context_compressor:
  enabled: true
  recent_keep: 10
  summary_refresh_interval: 10
  summary_max_tokens: 200
  background_summarize: false
  summarize_concurrency: 1

# ── Dual-Provider: Ollama(retrieval) + Lemonade(chat) ──

retrieval_provider:
  host: "http://host.docker.internal:11434"
  embedding_model: "Qwen3-Embedding-0.6B-GGUF"
  reranker_model: "bge-reranker-v2-m3-GGUF"

model_registry:
  default_model: "gpt-oss-20b-NPU"
  embedding_model: "Qwen3-Embedding-0.6B-GGUF"
  reranker_model: "bge-reranker-v2-m3-GGUF"

rag:
  enabled: true
  startup_index_enabled: false
  kb_dirs:
    - "/app/orca_runs"
    - "/app/orca_outputs"
  max_file_size_mb: 2
  trigger_keywords:
    - "문서"
    - "프로젝트"
    - "레포"
    - "노트"
    - "논문"
    - "출처"
    - "인용"
    - "어디에 적혀"
    - "내 파일"
    - "지식베이스"
    - "kb"
    - "검색해"
  chunk_min_tokens: 500
  chunk_max_tokens: 1200
  chunk_overlap_ratio: 0.15
  retrieve_k0: 40
  rerank_enabled: true
  rerank_topk: 8
  rerank_budget_ms: 1200
  retrieval_score_floor: 0.3
  supported_extensions:
    - ".md"
    - ".json"
    - ".py"
    - ".js"
    - ".ts"
