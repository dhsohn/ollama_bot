# ollama_bot 전역 설정
log_level: "INFO"
data_dir: "/app/data"

bot:
  name: "ollama_bot"
  language: "ko"
  max_conversation_length: 30
  response_timeout: 300

lemonade:
  host: "http://homelab:8000"
  api_key: ""
  default_model: "gpt-oss-20b-NPU"
  base_path: "/api/v1"
  temperature: 0.7
  max_tokens: 4096
  prompt_version: "v1"
  system_prompt: |
    당신은 유용한 AI 어시스턴트입니다.
    한국어로 답변하며, 간결하고 정확한 정보를 제공합니다.
    대화 기록이 주어질 경우, 반드시 가장 마지막 사용자 메시지에 대해 답변하세요.
    이전 대화는 맥락 파악에만 참고하고, 현재 질문에 집중하세요.
  timeout_seconds: 120
  model_load_timeout_seconds: 120
  heavy_model_load_timeout_seconds: 420

telegram:
  polling_interval: 1
  max_message_length: 4096

security:
  allowed_users: []
  rate_limit: 30
  max_concurrent_requests: 2
  max_input_length: 10000
  max_file_size: 10485760
  blocked_paths:
    - "/etc/*"
    - "/proc/*"
    - "/sys/*"

memory:
  backend: "sqlite"
  max_long_term_entries: 1000
  conversation_retention_days: 30

runtime_maintenance:
  memory_maintenance_interval_seconds: 21600  # 6시간
  llm_recovery_interval_seconds: 60
  memory_maintenance_jitter_ratio: 0.1

scheduler:
  timezone: "Asia/Seoul"

feedback:
  enabled: true
  show_buttons: true
  min_feedback_for_analysis: 5
  max_guidelines: 5
  preview_max_chars: 300
  preview_cache_max_size: 500
  preview_cache_ttl_hours: 24
  retention_days: 90
  collect_reason: true
  reason_min_chars: 3
  reason_max_chars: 500
  reason_timeout_seconds: 120
  dicl_enabled: true
  dicl_max_examples: 1
  dicl_max_keywords: 5
  dicl_max_total_chars: 1200
  dicl_recent_days: 180

auto_evaluation:
  enabled: false
  daily_limit: 50
  min_response_length: 50
  max_concurrency: 2
  cooldown_seconds: 300

instant_responder:
  enabled: true
  rules_path: "config/instant_rules.yaml"

semantic_cache:
  enabled: true
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  similarity_threshold: 0.96
  min_query_chars: 6
  exclude_patterns:
    - "(지금|현재)\\s*몇\\s*시"
    - "오늘\\s*(날짜|며칠|요일)"
  max_entries: 2000
  ttl_hours: 168
  invalidate_on_negative_feedback: true

intent_router:
  enabled: true
  routes_path: "config/intent_routes.yaml"
  min_confidence: 0.75
  encoder_model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"

context_compressor:
  enabled: true
  recent_keep: 10
  summary_refresh_interval: 10
  summary_max_tokens: 200
  background_summarize: false
  summarize_concurrency: 1

# ── Dual-Provider: Ollama(retrieval) + Lemonade(chat) ──

ollama:
  host: "http://homelab:11434"
  embedding_model: "dengcao/Qwen3-Embedding-0.6B:Q8_0"
  reranker_model: "dengcao/bge-reranker-v2-m3:latest"

rag:
  enabled: true
  startup_index_enabled: true
  kb_dirs:
    - "/app/kb/orca_runs"
    - "/app/kb/orca_outputs"
  max_file_size_mb: 5
  trigger_keywords:
    - "orca"
    - "결과"
    - "dft"
  chunk_min_tokens: 400
  chunk_max_tokens: 900
  chunk_overlap_ratio: 0.15
  retrieve_k0: 40
  rerank_enabled: true
  rerank_topk: 6
  rerank_budget_ms: 1200
  retrieval_score_floor: 0.25
  supported_extensions:
    - ".md"
    - ".json"
    - ".py"
    - ".js"
    - ".ts"
    - ".txt"
    - ".yaml"
    - ".yml"
    - ".cfg"
    - ".ini"
    - ".toml"
    - ".sh"
    - ".out"
    - ".log"

dft:
  enabled: true
  auto_index_on_startup: true
  max_file_size_mb: 64

# ── 시뮬레이션 작업 큐 ──

sim_queue:
  enabled: true
  total_cores: 16
  total_memory_mb: 131072       # 128 GB
  max_concurrent_jobs: 4
  default_retry_count: 2
  max_retry_count: 5
  retry_delay_seconds: 30
  queue_check_interval_seconds: 5
  adaptive_allocation_enabled: true
  adaptive_memory_step_mb: 1024
  external_agent_base_url: "http://sim_host_agent:18081"
  external_agent_timeout_seconds: 3.0
  external_agent_token_env: "SIM_EXTERNAL_AGENT_TOKEN"
  job_work_dir: "data/sim_jobs"
  tools:
    orca_auto:
      enabled: true
      executable: "/app/host/orca_auto/bin/orca_auto"
      cli_template: "{executable} run-inp --reaction-dir '{input_file}' > {output_file} 2>&1"
      command_prefix: ""
      min_cores: 2
      default_cores: 4
      min_memory_mb: 16384
      default_memory_mb: 32768
      max_cores: 16
      max_memory_mb: 65536
      output_extension: ".out"
      env_vars:
        OMP_NUM_THREADS: "{cores}"
    crest:
      enabled: true
      executable: "crest"
      cli_template: "{executable} {input_file} --T {cores} > {output_file} 2>&1"
      command_prefix: "conda run -n base"
      min_cores: 4
      default_cores: 8
      min_memory_mb: 32768
      default_memory_mb: 65536
      max_cores: 16
      max_memory_mb: 131072
      output_extension: ".out"
      env_vars:
        OMP_NUM_THREADS: "{cores}"
        OMP_STACKSIZE: "1G"
