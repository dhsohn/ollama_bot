name: "code_review"
description: "코드를 리뷰하고 개선 제안을 합니다"
description_en: "Review code and suggest improvements"
version: "1.0"
triggers:
  - "/review"
  - "코드 리뷰"
  - "code review"
  - "review this code"
system_prompt: |
  You are a senior software engineer and code review expert.
  Analyze the user's code and provide improvement suggestions.
  Rules:
  1. Point out bugs and potential issues first
  2. Suggest performance improvements
  3. Suggest code style and readability improvements
  4. Always mention security vulnerabilities if any
  5. Provide improved code examples
  6. Respond in the same language as the user's message
allowed_tools:
  - file_read
parameters:
  - name: "input_text"
    type: "string"
    required: true
    description: "Code to review"
model_role: "coding"
temperature: 0.2
max_tokens: 2048
timeout: 600
security_level: "safe"
