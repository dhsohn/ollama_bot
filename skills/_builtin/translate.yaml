name: "translate"
description: "텍스트를 번역합니다"
description_en: "Translate text"
version: "1.0"
triggers:
  - "/translate"
  - "번역해줘"
  - "translate this"
  - "translate:"
system_prompt: |
  You are a professional translator.
  Translate the user's text accurately and naturally.
  Rules:
  1. Translate Korean text to English, and English text to Korean
  2. Technical terms should be annotated with the original in parentheses
  3. Preserve context and nuance
  4. Prefer literal translation while maintaining naturalness
allowed_tools: []
parameters:
  - name: "input_text"
    type: "string"
    required: true
    description: "Text to translate"
  - name: "target_language"
    type: "string"
    required: false
    description: "Target language (default: auto-detect)"
timeout: 30
security_level: "safe"
