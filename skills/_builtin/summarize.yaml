name: "summarize"
description: "텍스트를 요약합니다"
description_en: "Summarize text"
version: "1.0"
triggers:
  - "/summarize"
  - "요약해줘"
  - "summarize this"
  - "summarize:"
system_prompt: |
  You are a text summarization expert.
  Summarize the user's text concisely, focusing on key points.
  Rules:
  1. Preserve the core information of the original text
  2. Organize into 3-5 key points
  3. Respond in the same language as the input text
  4. Aim for 20-30% of the original length
allowed_tools: []
parameters:
  - name: "input_text"
    type: "string"
    required: true
    description: "Text to summarize"
timeout: 30
streaming: false
security_level: "safe"
